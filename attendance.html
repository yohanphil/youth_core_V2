<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header"><h2>Attendance</h2><p>Mark and track attendance for all events and Sundays</p></div>
      <div class="grid-2" style="margin-bottom:18px;">
        <div class="card pad">
          <h2 style="font-size:15px;font-weight:700;margin-bottom:16px;">Mark Attendance</h2>
          <div class="form-grid">
            <div class="field"><label>Person *</label><select id="attendanceMember"><option value="">Select person…</option></select></div>
            <div class="field"><label>Status</label><select id="attendanceStatus"><option>Present</option><option>Late</option><option>Absent</option><option>Newcomer</option></select></div>
            <div class="field"><label>Event</label><select id="attendanceEventSelect" onchange="syncEvent()"><option value="">Custom / No event</option></select></div>
            <div class="field"><label>Date</label><input id="attendanceDate" type="date"></div>
            <div class="field span2"><label>Event Name (override)</label><input id="attendanceEvent" placeholder="Leave blank to use selected event name"></div>
          </div>
          <div style="margin-top:16px;display:flex;justify-content:flex-end;">
            <button class="btn btn-primary" onclick="markAttendance()">Mark Attendance</button>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><div><h2>Filter by Event</h2></div></div>
          <div class="card-body">
            <div class="field"><label>Show records for</label><select id="filterEventSelect" onchange="renderList()"><option value="">All Records</option></select></div>
            <p style="font-size:12px;color:var(--muted);margin-top:10px;" id="attendanceCount">—</p>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div><h2>Attendance Records</h2></div><button class="btn btn-sm btn-ghost" onclick="exportCSV()">Export CSV</button></div>
        <div id="attendanceList" class="list"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { mountShell, requireAuth, onData, store, canManage, notify, clean, roleKey, todayISO, $ } from './assets/js/core.js';
import { db, addDoc, deleteDoc, doc, collection, updateDoc, serverTimestamp } from './assets/js/firebase.js';

mountShell("attendance","Attendance");
$("attendanceDate").value = todayISO();

requireAuth(() => { onData(render); });

function render({ youthMembers, events, attendance }) {
  // People select
  const cur = $("attendanceMember")?.value;
  if ($("attendanceMember")) {
    $("attendanceMember").innerHTML = `<option value="">Select person…</option>` +
      [...youthMembers].sort((a,b)=>String(a.name).localeCompare(String(b.name))).map(m =>
        `<option value="${m.id}"${m.id===cur?" selected":""}>${clean(m.name)} — ${clean(m.team||m.ministry||"No Team")}</option>`).join("");
  }
  // Event selects
  const evHtml = `<option value="">Custom / No event</option>` + events.map(e => `<option value="${e.id}">${clean(e.title)} · ${clean(e.date||"")}</option>`).join("");
  const filterHtml = `<option value="">All Records</option>` + events.map(e => `<option value="${e.id}">${clean(e.title)} · ${clean(e.date||"")}</option>`).join("");
  if ($("attendanceEventSelect")) { const v=$("attendanceEventSelect").value; $("attendanceEventSelect").innerHTML=evHtml; $("attendanceEventSelect").value=v; }
  if ($("filterEventSelect")) { const v=$("filterEventSelect").value; $("filterEventSelect").innerHTML=filterHtml; $("filterEventSelect").value=v; }
  renderList();
}

window.syncEvent = function() {
  const id = $("attendanceEventSelect").value;
  const e = store.events.find(x => x.id === id);
  if (e) { $("attendanceDate").value = e.date || todayISO(); $("attendanceEvent").value = e.title || ""; }
  else $("attendanceEvent").value = "";
};

window.renderList = function() {
  const filterEvent = $("filterEventSelect")?.value;
  let records = store.attendance.slice();
  if (filterEvent) {
    const ev = store.events.find(e => e.id === filterEvent);
    records = records.filter(a => (a.eventId && a.eventId === filterEvent) || (ev && !a.eventId && a.eventName === ev.title && a.date === ev.date));
  }
  if ($("attendanceCount")) $("attendanceCount").textContent = `${records.length} record${records.length===1?"":"s"}`;
  if ($("attendanceList")) $("attendanceList").innerHTML = records.slice(0,100).map(a => `
    <div class="list-item">
      <div><h4>${clean(a.memberName)}</h4><p>${clean(a.eventName||"—")} · ${clean(a.date)} · ${clean(a.team||"No team")}</p></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="pill status-${roleKey(a.status)}">${clean(a.status)}</span>
        <button class="btn btn-xs btn-danger" onclick="deleteRec('${a.id}')">Delete</button>
      </div>
    </div>`).join("") || `<div class="empty">No attendance records${filterEvent?" for this event":""} yet.</div>`;
};

window.markAttendance = async function() {
  const memberId = $("attendanceMember").value;
  const selEventId = $("attendanceEventSelect").value;
  const selEvent = store.events.find(e => e.id === selEventId);
  const date = $("attendanceDate").value || selEvent?.date || todayISO();
  const eventName = selEvent ? selEvent.title : ($("attendanceEvent").value.trim() || "Church");
  const status = $("attendanceStatus").value;
  const m = store.youthMembers.find(x => x.id === memberId);
  if (!m || !date) return notify("Select a person and date");
  await addDoc(collection(db,"attendance"), { memberId, memberName:m.name, contactNumber:m.contactNumber||"", date, eventId:selEventId||"", eventName, status, cellLeader:m.cellLeader||"", team:m.team||"", createdAt:serverTimestamp() });
  if (["Present","Late","Newcomer"].includes(status)) await updateDoc(doc(db,"youthMembers",memberId), { lastAttendedDate:date, updatedAt:serverTimestamp() });
  notify("Attendance marked");
};

window.deleteRec = async function(id) {
  if (!canManage()) return notify("Only leaders can delete attendance.");
  if (confirm("Delete record?")) { await deleteDoc(doc(db,"attendance",id)); notify("Deleted"); }
};

window.exportCSV = function() {
  const rows = store.attendance;
  if (!rows.length) return notify("No data to export");
  const keys = ["memberName","contactNumber","eventName","date","status","team","cellLeader"];
  const csv = [keys.join(","), ...rows.map(r => keys.map(k => `"${String(r[k]??"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download = "attendance.csv"; a.click();
};
</script>
</body>
</html>
