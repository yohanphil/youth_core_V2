<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header"><h2>My Profile</h2><p>Your display picture, name and team identity</p></div>
      <div class="grid-2">
        <div class="card">
          <div class="card-head"><div><h2>Display Picture</h2><p>Upload or paste an image link</p></div></div>
          <div class="profile-photo-wrap">
            <div class="profile-avatar" id="profilePhoto">YC</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
              <label class="btn btn-sm btn-ghost" style="cursor:pointer;">Upload Photo<input type="file" accept="image/*" id="dpUpload" style="display:none;" onchange="previewDP(event)"></label>
              <button class="btn btn-sm btn-danger" onclick="removeDP()">Remove DP</button>
            </div>
          </div>
          <div class="card-body">
            <div class="field"><label>Or paste image URL</label><input id="profilePhotoUrlInput" placeholder="https://…" style="margin-top:0;"></div>
          </div>
        </div>
        <div class="card pad">
          <h2 style="font-size:15px;font-weight:700;margin-bottom:20px;">Profile Settings</h2>
          <div style="display:flex;flex-direction:column;gap:14px;">
            <div class="field"><label>Display Name</label><input id="profileNameInput" placeholder="Your name"></div>
            <div class="field"><label>Team / Ministry</label><input id="profileTeamInput" placeholder="Worship / Media…"></div>
            <div style="padding:14px;background:var(--panel-2);border-radius:var(--radius-sm);display:flex;flex-direction:column;gap:8px;">
              <div style="display:flex;justify-content:space-between;"><span style="font-size:12.5px;color:var(--muted);">Role</span><span id="profileRoleText" style="font-size:13px;font-weight:600;"></span></div>
              <div style="display:flex;justify-content:space-between;"><span style="font-size:12.5px;color:var(--muted);">Email</span><span id="profileEmailText" style="font-size:13px;"></span></div>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { mountShell, requireAuth, onData, store, notify, avatarHTML, $ } from './assets/js/core.js';
import { auth, db, updateDoc, doc, serverTimestamp } from './assets/js/firebase.js';

mountShell("profile","My Profile");
let pendingPhotoData = "";

requireAuth((user, profile) => {
  renderProfile(profile, user);
  onData(({ userProfiles }) => {
    const me = userProfiles.find(u => (u.uid||u.id) === user.uid);
    if (me) renderProfile(me, user);
  });
});

function renderProfile(profile, user) {
  if ($("profilePhoto")) $("profilePhoto").innerHTML = avatarHTML(profile, profile?.name || "YC");
  if ($("profileNameInput")) $("profileNameInput").value = profile?.name || "";
  if ($("profileTeamInput")) $("profileTeamInput").value = profile?.team || "";
  if ($("profileRoleText")) $("profileRoleText").textContent = profile?.role || "Member";
  if ($("profileEmailText")) $("profileEmailText").textContent = profile?.email || user?.email || "—";
}

window.previewDP = function(event) {
  const file = event.target.files?.[0];
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max=420, scale=Math.min(max/img.width, max/img.height, 1);
      const canvas=document.createElement("canvas"); canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      pendingPhotoData = canvas.toDataURL("image/jpeg",0.78);
      if ($("profilePhoto")) $("profilePhoto").innerHTML = `<img src="${pendingPhotoData}" alt="DP preview">`;
      notify("DP preview ready — click Save Profile.");
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveProfile = async function() {
  const user = auth.currentUser;
  if (!user) return notify("Not logged in.");
  const data = {
    name: $("profileNameInput").value.trim(),
    team: $("profileTeamInput").value.trim(),
    photoURL: $("profilePhotoUrlInput").value.trim(),
    updatedAt: serverTimestamp()
  };
  if (pendingPhotoData) data.photoData = pendingPhotoData;
  await updateDoc(doc(db,"userProfiles",user.uid), data);
  pendingPhotoData = "";
  notify("Profile updated");
};

window.removeDP = async function() {
  const user = auth.currentUser;
  if (!user) return;
  await updateDoc(doc(db,"userProfiles",user.uid), { photoData:"", photoURL:"", updatedAt:serverTimestamp() });
  pendingPhotoData = "";
  if ($("profilePhoto")) $("profilePhoto").textContent = "YC";
  notify("DP removed");
};
</script>
</body>
</html>
