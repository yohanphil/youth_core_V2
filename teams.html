<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header"><h2>Teams</h2><p>Ministries, cell leaders and cell groups</p></div>
      <div class="grid-3">
        <div class="card">
          <div class="card-head"><div><h2>Teams / Ministries</h2><p>Grouped by team field</p></div></div>
          <div id="teamsList" class="list"><div class="empty">Loading…</div></div>
        </div>
        <div class="card">
          <div class="card-head"><div><h2>Cell Leaders</h2></div></div>
          <div class="toolbar" style="border-bottom:1px solid var(--line);padding:12px 16px;gap:8px;">
            <input id="leaderName" placeholder="Leader name" style="flex:1;">
            <button class="btn btn-sm btn-primary" onclick="addLeader()">Add</button>
          </div>
          <div id="leadersList" class="list"><div class="empty">Loading…</div></div>
        </div>
        <div class="card">
          <div class="card-head"><div><h2>Cell Groups</h2></div></div>
          <div class="toolbar" style="border-bottom:1px solid var(--line);padding:12px 16px;gap:8px;">
            <input id="cellName" placeholder="Cell group name" style="flex:1;">
            <button class="btn btn-sm btn-primary" onclick="addCell()">Add</button>
          </div>
          <div id="cellsList" class="list"><div class="empty">Loading…</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { mountShell, requireAuth, onData, store, canManage, canAdmin, notify, clean, $ } from './assets/js/core.js';
import { db, addDoc, deleteDoc, doc, updateDoc, collection, serverTimestamp, writeBatch } from './assets/js/firebase.js';

mountShell("teams","Teams");
requireAuth(() => { onData(render); });

function render({ youthMembers, cellLeaders, cellGroups, userProfiles }) {
  const teams = {};
  youthMembers.forEach(m => { const k = m.team||m.ministry||"No Team"; if (!teams[k]) teams[k]=[]; teams[k].push(m); });
  if ($("teamsList")) $("teamsList").innerHTML = Object.entries(teams).sort((a,b)=>b[1].length-a[1].length).map(([team,items]) => `
    <div class="list-item">
      <div><h4>${clean(team)}</h4><p>${items.length} people · Leads: ${clean(userProfiles.filter(u=>u.team===team&&["Team Head","Team Lead"].includes(u.role)).map(u=>u.name).join(", ")||"Not assigned")}</p></div>
      <div class="list-item-actions">
        <button class="btn btn-xs" onclick="renameTeam('${encodeURIComponent(team)}')">Rename</button>
        <button class="btn btn-xs btn-danger" onclick="deleteTeam('${encodeURIComponent(team)}')">Delete</button>
      </div>
    </div>`).join("") || `<div class="empty">No teams yet.</div>`;

  if ($("leadersList")) $("leadersList").innerHTML = cellLeaders.map(l => `
    <div class="list-item">
      <div><h4>${clean(l.name)}</h4><p>${clean(l.contactNumber||"No phone")}</p></div>
      <button class="btn btn-xs btn-danger" onclick="delLeader('${l.id}')">Delete</button>
    </div>`).join("") || `<div class="empty">No leaders yet.</div>`;

  if ($("cellsList")) $("cellsList").innerHTML = cellGroups.map(c => `
    <div class="list-item">
      <div><h4>${clean(c.cellGroupName)}</h4><p>Lead: ${clean(c.leader||"—")} · ${Array.isArray(c.members)?c.members.length:0} imported members</p></div>
      <button class="btn btn-xs btn-danger" onclick="delCell('${c.id}')">Delete</button>
    </div>`).join("") || `<div class="empty">No cell groups yet.</div>`;
}

window.addLeader = async function() {
  if (!canManage()) return notify("Only Admin or Core Moderator can add leaders.");
  const name = $("leaderName").value.trim();
  if (!name) return notify("Leader name required");
  await addDoc(collection(db,"cellLeaders"), { name, contactNumber:"", role:"Cell Leader", status:"Active", createdAt:serverTimestamp() });
  $("leaderName").value = ""; notify("Leader added");
};

window.addCell = async function() {
  if (!canManage()) return notify("Only Admin or Core Moderator can add cell groups.");
  const cellGroupName = $("cellName").value.trim();
  if (!cellGroupName) return notify("Cell name required");
  await addDoc(collection(db,"cellGroups"), { cellGroupName, leader:"", assistantLeader:"", area:"", members:[], status:"Active", createdAt:serverTimestamp() });
  $("cellName").value = ""; notify("Cell group added");
};

window.delLeader = async function(id) {
  if (!canAdmin()) return notify("Only Admin can delete cell leaders.");
  if (confirm("Delete this cell leader?")) { await deleteDoc(doc(db,"cellLeaders",id)); notify("Deleted"); }
};

window.delCell = async function(id) {
  if (!canAdmin()) return notify("Only Admin can delete cell groups.");
  if (confirm("Delete this cell group?")) { await deleteDoc(doc(db,"cellGroups",id)); notify("Deleted"); }
};

window.renameTeam = async function(encoded) {
  if (!canAdmin()) return notify("Only Admin can rename teams.");
  const oldTeam = decodeURIComponent(encoded);
  if (oldTeam === "No Team") return notify("Cannot rename No Team.");
  const newTeam = prompt(`Rename "${oldTeam}" to:`);
  if (!newTeam?.trim()) return;
  const batch = writeBatch(db); let count = 0;
  store.youthMembers.forEach(m => {
    const u = {}; if ((m.team||"")===oldTeam) u.team=newTeam.trim(); if ((m.ministry||"")===oldTeam) u.ministry=newTeam.trim();
    if (Object.keys(u).length) { u.updatedAt=serverTimestamp(); batch.update(doc(db,"youthMembers",m.id),u); count++; }
  });
  store.userProfiles.forEach(u => {
    if ((u.team||"")===oldTeam) { batch.update(doc(db,"userProfiles",u.uid||u.id),{team:newTeam.trim(),updatedAt:serverTimestamp()}); count++; }
  });
  await batch.commit(); notify(`Renamed for ${count} records`);
};

window.deleteTeam = async function(encoded) {
  if (!canAdmin()) return notify("Only Admin can delete teams.");
  const team = decodeURIComponent(encoded);
  if (team === "No Team") return notify("Cannot delete No Team.");
  if (!confirm(`Clear team "${team}" from all members? People won't be deleted.`)) return;
  const batch = writeBatch(db); let count = 0;
  store.youthMembers.forEach(m => {
    const u = {}; if ((m.team||"")===team) u.team=""; if ((m.ministry||"")===team) u.ministry="";
    if (Object.keys(u).length) { u.updatedAt=serverTimestamp(); batch.update(doc(db,"youthMembers",m.id),u); count++; }
  });
  store.userProfiles.forEach(u => {
    if ((u.team||"")===team) { batch.update(doc(db,"userProfiles",u.uid||u.id),{team:"",updatedAt:serverTimestamp()}); count++; }
  });
  await batch.commit(); notify(`Team cleared from ${count} records`);
};
</script>
</body>
</html>
