<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header">
        <div class="page-header-row">
          <div><h2>Events</h2><p>Special youth events — attendance, reports and game plans</p></div>
          <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Event</button>
        </div>
      </div>
      <div class="card" id="eventListCard">
        <div id="eventList"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal-card" style="max-width:640px;">
    <div class="modal-card-head">
      <div><h2 id="eventModalTitle">Add Event</h2><p>Create or update a special youth event</p></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-card-body">
      <div class="form-grid">
        <div class="field span2"><label>Event Title *</label><input id="eventTitle" placeholder="e.g. Youth Camp 2026"></div>
        <div class="field"><label>Type</label><select id="eventType"><option>Special Youth Event</option><option>Conference</option><option>Camp</option><option>Outreach</option><option>Other</option></select></div>
        <div class="field"><label>Date *</label><input id="eventDate" type="date"></div>
        <div class="field"><label>Time</label><input id="eventTime" type="time"></div>
        <div class="field"><label>Venue</label><input id="eventLocation" placeholder="Venue or address"></div>
        <div class="field"><label>Event Owner</label><input id="eventOwner" placeholder="Responsible person"></div>
        <div class="field"><label>Expected Count</label><input id="eventExpected" type="number" placeholder="0"></div>
        <div class="field span2"><label>Flyer Image URL</label><input id="eventFlyerUrl" placeholder="https://…"></div>
        <div class="field span2"><label>Upload Flyer</label><input type="file" accept="image/*" onchange="previewFlyer(event)" style="padding:6px;"></div>
        <div id="eventFlyerPreview" class="hidden" style="grid-column:1/-1;border-radius:12px;overflow:hidden;max-height:180px;"><img style="width:100%;object-fit:cover;max-height:180px;" alt="Flyer preview"></div>
        <div class="field span2"><label>Registration Link</label><input id="eventRegistrationLink" placeholder="https://forms.gle/…"></div>
        <div class="field span2"><label>Sheet / Tracker Link</label><input id="eventSheetLink" placeholder="https://docs.google.com/…"></div>
        <div class="field span2"><label>Description</label><textarea id="eventDescription" placeholder="What's this event about?"></textarea></div>
      </div>
    </div>
    <div class="modal-card-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="eventSaveBtn" onclick="saveEvent()">Create Event</button>
    </div>
  </div>
</div>

<script type="module">
import { mountShell, requireAuth, onData, store, canManage, canAdmin, notify, clean, safeImg, validUrl, isSpecialEvent, isSundayEvent, $ } from './assets/js/core.js';
import { db, addDoc, updateDoc, deleteDoc, doc, collection, serverTimestamp } from './assets/js/firebase.js';

mountShell("events","Events");
let editingId = null;
let pendingFlyerData = "";

requireAuth(() => { onData(render); });

function eventStats(e) {
  const { youthMembers, attendance } = store;
  const records = attendance.filter(a => (a.eventId && a.eventId===e.id) || (!a.eventId && a.eventName===e.title && a.date===e.date));
  const map = new Map(); records.forEach(a => { if (!map.has(a.memberId)) map.set(a.memberId, a.status); });
  let came=0, absent=0, notMarked=0;
  youthMembers.forEach(m => { const s=map.get(m.id); if(["Present","Late","Newcomer"].includes(s)) came++; else if(s==="Absent") absent++; else notMarked++; });
  return { came, absent, notMarked, total:youthMembers.length };
}

function flyerHTML(e) {
  const img = safeImg(e.flyerData) || safeImg(e.flyerURL);
  if (img) return `<img src="${img}" style="width:100%;height:100%;object-fit:cover;" alt="Flyer">`;
  return `<span style="font-size:11px;color:var(--muted);">No Flyer</span>`;
}

function render({ events }) {
  const special = events.filter(isSpecialEvent).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
  if ($("eventList")) $("eventList").innerHTML = special.length ? special.map(e => {
    const s = eventStats(e);
    return `
    <div class="list-item event-card" style="padding:16px 22px;">
      <div class="event-flyer">${flyerHTML(e)}</div>
      <div class="event-info">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;">
          <span class="pill">${clean(e.eventType||"Event")}</span>
          <span class="pill status-${e.status==="Completed"?"Completed":"Active"}">${clean(e.status||"Upcoming")}</span>
        </div>
        <h4 style="font-size:16px;">${clean(e.title)}</h4>
        <p>${clean(e.date||"No date")} ${clean(e.time||"")} · ${clean(e.location||"No venue")}</p>
        <p style="margin-top:4px;">${clean(e.description||"")}</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
          <span class="pill status-Present">${s.came} came</span>
          <span class="pill status-Absent">${s.absent} absent</span>
          <span class="pill">${s.notMarked} not marked</span>
        </div>
        <div class="event-actions">
          <a href="event-detail.html?id=${e.id}" class="btn btn-sm btn-purple">View Details</a>
          ${validUrl(e.registrationLink) ? `<a class="btn btn-sm" href="${clean(e.registrationLink)}" target="_blank" rel="noopener">Register</a>` : ""}
          ${validUrl(e.sheetLink) ? `<a class="btn btn-sm btn-ghost" href="${clean(e.sheetLink)}" target="_blank" rel="noopener">Sheet</a>` : ""}
          <button class="btn btn-sm" onclick="editEvent('${e.id}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="delEvent('${e.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join("") : `<div class="empty" style="padding:48px;">No special events yet. Click + Add Event to create your next youth event.</div>`;
}

window.openModal = function() {
  if (!canManage()) return notify("Only Admin or Core Moderator can create events.");
  editingId = null; pendingFlyerData = ""; clearForm();
  $("eventModalTitle").textContent = "Add Event";
  $("eventSaveBtn").textContent = "Create Event";
  $("eventModal").classList.add("active");
};

window.editEvent = function(id) {
  if (!canManage()) return notify("Only Admin or Core Moderator can edit events.");
  const e = store.events.find(x => x.id === id);
  if (!e) return;
  editingId = id; pendingFlyerData = e.flyerData || "";
  $("eventModalTitle").textContent = "Edit Event";
  $("eventSaveBtn").textContent = "Update Event";
  $("eventType").value = e.eventType||"Special Youth Event";
  $("eventTitle").value = e.title||""; $("eventDate").value = e.date||"";
  $("eventTime").value = e.time||""; $("eventLocation").value = e.location||"";
  $("eventOwner").value = e.owner||""; $("eventExpected").value = e.expectedCount||"";
  $("eventFlyerUrl").value = e.flyerURL||""; $("eventRegistrationLink").value = e.registrationLink||"";
  $("eventSheetLink").value = e.sheetLink||""; $("eventDescription").value = e.description||"";
  const prev = $("eventFlyerPreview");
  const img = safeImg(e.flyerData) || safeImg(e.flyerURL);
  if (img) { prev.classList.remove("hidden"); prev.querySelector("img").src = img; } else prev.classList.add("hidden");
  $("eventModal").classList.add("active");
};

window.closeModal = function() { $("eventModal").classList.remove("active"); };

function clearForm() {
  ["eventTitle","eventDate","eventTime","eventLocation","eventOwner","eventExpected","eventFlyerUrl","eventRegistrationLink","eventSheetLink","eventDescription"].forEach(id => { if ($(id)) $(id).value = ""; });
  $("eventType").value = "Special Youth Event";
  $("eventFlyerPreview").classList.add("hidden");
}

window.previewFlyer = function(event) {
  const file = event.target.files?.[0];
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max=1000, scale=Math.min(max/img.width, max/img.height, 1);
      const canvas=document.createElement("canvas"); canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      pendingFlyerData = canvas.toDataURL("image/jpeg", 0.78);
      const prev = $("eventFlyerPreview");
      prev.classList.remove("hidden"); prev.querySelector("img").src = pendingFlyerData;
      notify("Flyer ready — click Create Event to save.");
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveEvent = async function() {
  if (!canManage()) return notify("Only Admin or Core Moderator can save events.");
  const title = $("eventTitle").value.trim();
  const date = $("eventDate").value;
  if (!title || !date) return notify("Title and date are required.");
  const data = {
    eventType: $("eventType").value, title, date,
    time: $("eventTime").value, location: $("eventLocation").value.trim(),
    owner: $("eventOwner").value.trim(), expectedCount: Number($("eventExpected").value||0),
    description: $("eventDescription").value.trim(), flyerURL: $("eventFlyerUrl").value.trim(),
    registrationLink: $("eventRegistrationLink").value.trim(), sheetLink: $("eventSheetLink").value.trim(),
    status: "Upcoming", updatedAt: serverTimestamp()
  };
  if (pendingFlyerData) data.flyerData = pendingFlyerData;
  if (editingId) { await updateDoc(doc(db,"events",editingId), data); notify("Event updated"); }
  else { data.createdAt = serverTimestamp(); await addDoc(collection(db,"events"), data); notify("Event created"); }
  closeModal();
};

window.delEvent = async function(id) {
  if (!canAdmin()) return notify("Only Admin can delete events.");
  if (confirm("Delete this event?")) { await deleteDoc(doc(db,"events",id)); notify("Event deleted"); }
};
</script>
</body>
</html>
