<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newcomer — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header"><h2>Newcomer</h2><p>Quick capture after church or youth meeting</p></div>
      <div class="grid-2">
        <div class="card pad">
          <h2 style="font-size:15px;font-weight:700;margin-bottom:18px;">Add Newcomer</h2>
          <div class="form-grid">
            <div class="field"><label>Full Name *</label><input id="newName" placeholder="Name Surname"></div>
            <div class="field"><label>Phone</label><input id="newPhone" type="tel" placeholder="+94…"></div>
            <div class="field"><label>Gender</label><select id="newGender"><option value="">—</option><option>Male</option><option>Female</option></select></div>
            <div class="field"><label>Location</label><input id="newLocation" placeholder="City / Town"></div>
            <div class="field"><label>Invited By</label><input id="newInvitedBy" placeholder="Friend name"></div>
            <div class="field"><label>First Visit Date</label><input id="newFirstVisit" type="date"></div>
            <div class="field"><label>Cell Leader Assigned</label><input id="newCellLeader" placeholder="Cell leader name"></div>
            <div class="field"><label>Ministry / Team</label><input id="newTeam" placeholder="Worship / Media…"></div>
            <div class="field span2"><label>Notes</label><textarea id="newNotes" placeholder="How did they hear about us? Any prayer request…"></textarea></div>
          </div>
          <div style="margin-top:18px;display:flex;gap:10px;justify-content:flex-end;">
            <button class="btn btn-primary" onclick="addNewcomer()">Save Newcomer + Create Follow-up</button>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><div><h2>Recent Newcomers</h2><p>Last 20 newcomers added</p></div></div>
          <div id="newcomerList" class="list"><div class="empty">Loading…</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { mountShell, requireAuth, onData, store, canManage, notify, clean, initials, avatarHTML, todayISO, $ } from './assets/js/core.js';
import { db, addDoc, collection, serverTimestamp } from './assets/js/firebase.js';

mountShell("newcomer","Newcomer");
$("newFirstVisit").value = todayISO();

requireAuth(() => { onData(render); });

function render({ youthMembers }) {
  const newcomers = youthMembers.filter(m => m.memberType === "Newcomer").slice(0,20);
  if ($("newcomerList")) $("newcomerList").innerHTML = newcomers.length
    ? newcomers.map(m => `
      <div class="list-item">
        <div class="person">
          <div class="avatar">${avatarHTML(null,m.name)}</div>
          <div><h4>${clean(m.name)}</h4><p>${clean(m.contactNumber||"No phone")} · First visit: ${clean(m.firstVisitDate||"Unknown")}</p></div>
        </div>
        <span class="pill status-Newcomer">Newcomer</span>
      </div>`).join("")
    : `<div class="empty">No newcomers yet.</div>`;
}

window.addNewcomer = async function() {
  if (!canManage()) return notify("Only Admin or Core Moderator can add newcomers.");
  const name = $("newName").value.trim();
  if (!name) return notify("Name required");
  const contactNumber = $("newPhone").value.trim();
  const data = {
    name, contactNumber,
    gender: $("newGender").value,
    location: $("newLocation").value.trim(),
    invitedBy: $("newInvitedBy").value.trim(),
    firstVisitDate: $("newFirstVisit").value || todayISO(),
    cellLeader: $("newCellLeader").value.trim(),
    team: $("newTeam").value.trim(),
    ministry: $("newTeam").value.trim(),
    notes: $("newNotes").value.trim(),
    memberType: "Newcomer", status: "Active",
    followUpStatus: "Pending",
    lastAttendedDate: $("newFirstVisit").value || todayISO(),
    createdAt: serverTimestamp(), updatedAt: serverTimestamp()
  };
  const ref = await addDoc(collection(db,"youthMembers"), data);
  await addDoc(collection(db,"followUps"), {
    memberId: ref.id, memberName: name, contactNumber,
    reason: "Newcomer follow-up", assignedTo: data.cellLeader || "Unassigned",
    status: "Pending", dueDate: "", notes: data.notes, createdAt: serverTimestamp()
  });
  ["newName","newPhone","newLocation","newInvitedBy","newCellLeader","newTeam","newNotes"].forEach(id => { if ($(id)) $(id).value = ""; });
  $("newGender").value = "";
  $("newFirstVisit").value = todayISO();
  notify("Newcomer saved + follow-up created");
};
</script>
</body>
</html>
