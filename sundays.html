<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundays — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header"><h2>Sundays</h2><p>Auto-generate and track weekly Sunday service attendance</p></div>
      <div class="grid-2" style="margin-bottom:18px;">
        <div class="card pad">
          <h2 style="font-size:15px;font-weight:700;margin-bottom:16px;">Generate Sunday Services</h2>
          <div class="form-grid">
            <div class="field"><label>Venue</label><input id="sundayVenue" placeholder="Raffles Hall" value="Raffles Hall"></div>
            <div class="field"><label>Service Time</label><input id="sundayTime" type="time" value="17:30"></div>
            <div class="field"><label>How many Sundays?</label><input id="sundayCount" type="number" value="12" min="1" max="52"></div>
          </div>
          <div style="margin-top:16px;display:flex;justify-content:flex-end;">
            <button class="btn btn-primary" onclick="genSundays()">Generate Sundays</button>
          </div>
        </div>
        <div class="card pad" style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;text-align:center;">
          <div style="font-size:36px;">⛪</div>
          <h3 id="sundayStatLabel" style="font-size:15px;font-weight:700;">Loading…</h3>
          <p style="font-size:13px;color:var(--muted);">Sunday services in the database</p>
          <a href="attendance.html" class="btn btn-sm btn-primary">Mark Attendance</a>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div><h2>Sunday Services</h2><p>Sorted by date</p></div></div>
        <div id="sundayList"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { mountShell, requireAuth, onData, store, canManage, notify, clean, isSundayEvent, $ } from './assets/js/core.js';
import { db, addDoc, deleteDoc, doc, collection, serverTimestamp } from './assets/js/firebase.js';

mountShell("sundays","Sundays");
requireAuth(() => { onData(render); });

function render({ events, attendance, youthMembers }) {
  const sundays = events.filter(isSundayEvent).sort((a,b)=>String(a.date||"").localeCompare(String(b.date||"")));
  if ($("sundayStatLabel")) $("sundayStatLabel").textContent = `${sundays.length} Sunday services`;
  if ($("sundayList")) $("sundayList").innerHTML = sundays.length ? sundays.map(e => {
    const records = attendance.filter(a => (a.eventId&&a.eventId===e.id)||(!a.eventId&&a.eventName===e.title&&a.date===e.date));
    const came = new Set(records.filter(a=>["Present","Late","Newcomer"].includes(a.status)).map(a=>a.memberId)).size;
    const didnt = youthMembers.length - came;
    return `<div class="sunday-card">
      <div><h4>${clean(e.title)} · ${clean(e.date||"No date")}</h4><p>${clean(e.time||"")} · ${clean(e.location||"No venue")} · <span class="pill status-Present" style="font-size:11px;">${came} came</span> · ${didnt} did not come</p></div>
      <div class="sunday-card-actions">
        <a href="event-detail.html?id=${e.id}" class="btn btn-xs btn-purple">Details</a>
        <button class="btn btn-xs btn-danger" onclick="del('${e.id}')">Delete</button>
      </div>
    </div>`;
  }).join("") : `<div class="empty">No Sunday services yet. Generate them above.</div>`;
}

function nextSunday(d) {
  const day = d.getDay();
  const diff = (7 - day) % 7 || 7;
  return new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff);
}

window.genSundays = async function() {
  if (!canManage()) return notify("Only Admin or Core Moderator can generate Sundays.");
  const venue = $("sundayVenue").value.trim() || "Church";
  const time = $("sundayTime").value || "17:30";
  const count = Math.min(52, Math.max(1, parseInt($("sundayCount").value)||12));
  let d = nextSunday(new Date()); let created = 0;
  for (let i = 0; i < count; i++) {
    const date = d.toISOString().slice(0,10);
    const exists = store.events.some(e => isSundayEvent(e) && e.date === date);
    if (!exists) {
      await addDoc(collection(db,"events"), {
        eventType:"Sunday Service", title:"Sunday Service", date, time, location:venue,
        owner:"Youth Central", expectedCount:0, description:"Weekly Sunday service.",
        flyerURL:"", flyerData:"", registrationLink:"", sheetLink:"", status:"Upcoming",
        createdAt:serverTimestamp(), updatedAt:serverTimestamp()
      });
      created++;
    }
    d = nextSunday(d);
  }
  notify(`Generated ${created} Sunday service${created===1?"":"s"}`);
};

window.del = async function(id) {
  if (confirm("Delete this Sunday service?")) { await deleteDoc(doc(db,"events",id)); notify("Deleted"); }
};
</script>
</body>
</html>
