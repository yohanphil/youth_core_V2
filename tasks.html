<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — Youth Central</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="toast"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-header">
        <div class="page-header-row">
          <div><h2>Tasks</h2><p>Add responsibilities — team members get notified</p></div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-sm btn-ghost" onclick="enableNotif()">Enable Alerts</button>
            <button class="btn btn-sm btn-ghost" onclick="exportCSV()">Export CSV</button>
          </div>
        </div>
      </div>

      <!-- Add task -->
      <div class="card pad" style="margin-bottom:18px;">
        <h2 style="font-size:14px;font-weight:700;margin-bottom:14px;">New Task</h2>
        <div class="form-grid">
          <div class="field span2"><label>Task Title *</label><input id="taskTitle" placeholder="What needs to be done?"></div>
          <div class="field"><label>Assign To</label><select id="taskOwner"><option value="">Unassigned</option></select></div>
          <div class="field"><label>Team</label><input id="taskTeam" placeholder="Team / Ministry"></div>
          <div class="field"><label>Due Date</label><input id="taskDue" type="date"></div>
          <div class="field"><label>Priority</label><select id="taskPriority"><option>Normal</option><option>High</option><option>Low</option></select></div>
          <div class="field span2"><label>Notes</label><textarea id="taskNotes" placeholder="Additional details…" style="min-height:60px;"></textarea></div>
        </div>
        <div style="margin-top:14px;display:flex;justify-content:flex-end;">
          <button class="btn btn-primary" onclick="addTask()">Add Task + Notify Team</button>
        </div>
      </div>

      <!-- Kanban -->
      <div class="kanban">
        <div class="card kanban-col">
          <div class="kanban-col-head">📋 To Do <span id="todoCount" style="margin-left:6px;color:var(--muted);font-weight:400;"></span></div>
          <div id="todoTasks"><div class="empty">No tasks</div></div>
        </div>
        <div class="card kanban-col">
          <div class="kanban-col-head" style="color:var(--accent-cyan);">⚡ In Progress <span id="progressCount" style="margin-left:6px;color:var(--muted);font-weight:400;"></span></div>
          <div id="progressTasks"><div class="empty">No tasks</div></div>
        </div>
        <div class="card kanban-col">
          <div class="kanban-col-head" style="color:var(--green);">✅ Completed <span id="completedCount" style="margin-left:6px;color:var(--muted);font-weight:400;"></span></div>
          <div id="completedTasks"><div class="empty">No tasks</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { mountShell, requireAuth, onData, store, canManage, notify, clean, roleKey, $ } from './assets/js/core.js';
import { db, addDoc, updateDoc, deleteDoc, doc, collection, serverTimestamp } from './assets/js/firebase.js';

mountShell("tasks","Tasks");
requireAuth(() => { onData(render); });

function render({ tasks, youthMembers }) {
  const cur = $("taskOwner")?.value;
  if ($("taskOwner")) {
    $("taskOwner").innerHTML = `<option value="">Unassigned</option>` + youthMembers.map(m => `<option${m.name===cur?" selected":""}>${clean(m.name)}</option>`).join("");
    $("taskOwner").value = cur;
  }
  const todo = tasks.filter(t => t.status === "todo");
  const progress = tasks.filter(t => t.status === "progress");
  const completed = tasks.filter(t => t.status === "completed");
  if ($("todoCount")) $("todoCount").textContent = `(${todo.length})`;
  if ($("progressCount")) $("progressCount").textContent = `(${progress.length})`;
  if ($("completedCount")) $("completedCount").textContent = `(${completed.length})`;
  renderCol("todoTasks", todo);
  renderCol("progressTasks", progress);
  renderCol("completedTasks", completed);
}

function priorityColor(p) {
  if (p === "High") return "var(--danger)";
  if (p === "Low") return "var(--muted)";
  return "var(--accent-cyan)";
}

function renderCol(id, tasks) {
  const el = $(id);
  if (!el) return;
  el.innerHTML = tasks.length ? tasks.map(t => `
    <div class="task-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <h4>${clean(t.title)}</h4>
        <span style="font-size:10.5px;font-weight:700;color:${priorityColor(t.priority)};flex-shrink:0;">${clean(t.priority||"Normal")}</span>
      </div>
      <p style="margin-top:4px;">${clean(t.team||"General")} · ${clean(t.owner||"Unassigned")}${t.due ? ` · Due ${clean(t.due)}` : ""}</p>
      ${t.notes ? `<p style="margin-top:4px;color:var(--faint);font-size:12px;">${clean(t.notes)}</p>` : ""}
      <div class="task-card-foot">
        ${t.status !== "todo" ? `<button class="btn btn-xs btn-ghost" onclick="move('${t.id}','todo')">To Do</button>` : ""}
        ${t.status !== "progress" ? `<button class="btn btn-xs btn-yellow" onclick="move('${t.id}','progress')">In Progress</button>` : ""}
        ${t.status !== "completed" ? `<button class="btn btn-xs btn-green" onclick="move('${t.id}','completed')">Done</button>` : ""}
        <button class="btn btn-xs btn-danger" onclick="del('${t.id}')">Delete</button>
      </div>
    </div>`).join("") : `<div class="empty" style="padding:24px 16px;">No tasks here.</div>`;
}

window.addTask = async function() {
  const title = $("taskTitle").value.trim();
  if (!title) return notify("Task title required");
  const task = {
    title, owner: $("taskOwner").value, team: $("taskTeam").value.trim(),
    due: $("taskDue").value, priority: $("taskPriority").value,
    notes: $("taskNotes").value.trim(), status: "todo", createdAt: serverTimestamp()
  };
  const ref = await addDoc(collection(db,"tasks"), task);
  await addDoc(collection(db,"notifications"), {
    type:"task", title:"New task added", body:title, taskId:ref.id,
    team:task.team||"All", createdAt:serverTimestamp(), readBy:[]
  });
  ["taskTitle","taskTeam","taskDue","taskNotes"].forEach(id => { if ($(id)) $(id).value = ""; });
  notify("Task added + team notified");
};

window.move = async function(id, status) {
  await updateDoc(doc(db,"tasks",id), { status, updatedAt:serverTimestamp() });
};

window.del = async function(id) {
  if (!canManage()) return notify("Only leaders can delete tasks.");
  if (confirm("Delete task?")) { await deleteDoc(doc(db,"tasks",id)); notify("Deleted"); }
};

window.enableNotif = async function() {
  if (!("Notification" in window)) return notify("Notifications not supported here.");
  const result = await Notification.requestPermission();
  notify(result === "granted" ? "Task alerts enabled!" : "Notification permission not granted.");
};

window.exportCSV = function() {
  const rows = store.tasks;
  if (!rows.length) return notify("No tasks to export");
  const keys = ["title","owner","team","priority","due","status","notes"];
  const csv = [keys.join(","), ...rows.map(r => keys.map(k => `"${String(r[k]??"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download = "tasks.csv"; a.click();
};
</script>
</body>
</html>
